<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九宫格</title>
    <!-- reset -->
    <style>
        * {
            margin: 0;
            padding: 0;
            border: 0;
            font-size: 100%;
            vertical-align: baseline;
        }
    </style>
    <!-- common -->
    <style media="screen">
        .main {
            width: 300px;
            margin: 30px auto;
        }
        .grid {
            display: flex;
            flex-wrap: wrap;
            width: 300px;
        }
        .grid li {
            box-sizing: border-box;
            list-style: none;
            width: 100px;
            height: 100px;
            text-align: center;
            line-height: 100px;
            border: 4px solid #ccc;
            margin-left: -4px;
            margin-top: -4px;
        }
        .grid li:hover {
            border-color: red;
            z-index: 1;
        }
        .grid li:nth-child(3n+1) {
            margin-left: 0;
        }
    </style>
</head>
<body>
    <div class="main">
        <ul class="grid">
            <li>1</li>
            <li>2</li>
            <li>3</li>
            <li>4</li>
            <li>5</li>
            <li>6</li>
            <li>7</li>
            <li>8</li>
            <li>9</li>
        </ul>
    </div>
</body>
</html>
